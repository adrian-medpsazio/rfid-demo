# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: TBD (greenfield - RFID access control system)
  Architecture: TBD
  Hardware: Zebra FX9600 UHF RFID reader
  Testing: None configured

rules:
  proposal:
    - Include rollback plan for risky changes
    - Hardware integration changes require safety review
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for RFID read flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
    - Preserve hardware communication specs