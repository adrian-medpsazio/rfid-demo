version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: rfid-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rfid_access
      POSTGRES_USER: rfid_user
      POSTGRES_PASSWORD: rfid_pass
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: rfid-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  minio-data:
